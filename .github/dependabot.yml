version: 2
updates:
- package-ecosystem: cargo
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Madrid
  open-pull-requests-limit: 1
  labels:
  - deps
  - rust
  commit-message:
    prefix: chore(deps)
    include: scope
  groups:
    tracing:
      patterns:
      - tracing*
      - opentelemetry*
    tokio-stack:
      patterns:
      - tokio*
      - tower*
      - hyper*
      - axum*
    rustls-stack:
      patterns:
      - rustls*
      - tokio-rustls
      - rustls-pemfile
      - x509-parser
    all-others:
      patterns:
      - '*'
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  labels:
  - deps
  - ci
  commit-message:
    prefix: chore(ci)
  open-pull-requests-limit: 1
  groups:
    all-others:
      patterns:
      - '*'
- package-ecosystem: docker
  directory: /
  schedule:
    interval: weekly
  labels:
  - deps
  - docker
  commit-message:
    prefix: chore(docker)
  open-pull-requests-limit: 1
  groups:
    all-others:
      patterns:
      - '*'

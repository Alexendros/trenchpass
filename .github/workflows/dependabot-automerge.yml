# Dependabot auto-merge
#
# Aprueba y activa auto-merge en PRs de dependabot cuando son patch o minor.
# Major bumps (semver-major) NO se auto-mergean: requieren revisión humana
# porque pueden romper API.
#
# Pre-requisitos:
#   1. Branch protection en `main` con "Require approvals = 0" o que
#      `github-actions[bot]` esté permitido como aprobador.
#   2. "Allow auto-merge" activado en Settings → General → Pull Requests.
#   3. CI verde como Required status check (fmt, clippy, test, audit, deny).
#
# Seguridad:
#   - Se usa `pull_request` (no `pull_request_target`) porque solo se necesita
#     `secrets.GITHUB_TOKEN` y los PRs de Dependabot nacen en el mismo repo.
#   - El job se ejecuta únicamente si el autor del PR es `dependabot[bot]` y
#     su tipo de cuenta es `Bot`, evitando que un actor suplantado dispare la
#     lógica de auto-merge.
#   - Permisos mínimos restringidos al job: solo `pull-requests` y `contents`.
name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.user.type == 'Bot'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash) for patch and minor
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label majors for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "needs-human-review"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
